# .github/workflows/codeql.yml
#
# {{PROJECT_NAME}} — CodeQL SAST with automatic language detection.
#
# Detects languages from manifest files (package.json, pyproject.toml /
# requirements.txt, *.csproj, go.mod) and builds the analysis matrix
# dynamically — the same file works unchanged across all repos.
#
# Callable as a reusable workflow (workflow_call) from pr-checks.yml and
# release-gates.yml, and also runs standalone on push/schedule so new CVE
# queries re-scan existing code weekly.
#
# PINNING: run `pinact run` to pin @vN tags to SHAs before production use.

name: CodeQL Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC — catches newly published queries/CVEs
  workflow_call: # allows pr-checks.yml / release-gates.yml to invoke this

permissions:
  actions: read
  contents: read
  security-events: write # upload SARIF to the GitHub Security tab

jobs:
  # ---------------------------------------------------------- detect-languages --
  detect-languages:
    name: Detect CodeQL languages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build language matrix from manifest files
        id: detect
        shell: bash
        run: |
          langs='[]'
          add() {
            langs=$(echo "$langs" | jq -c --arg l "$1" --arg b "$2" \
              '. + [{language: $l, "build-mode": $b}]')
          }

          # Interpreted languages: build-mode "none" (no build required)
          if [ -f package.json ]; then
            add javascript-typescript none
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            add python none
          fi

          # Compiled languages: autobuild (CodeQL traces the build)
          if [ -n "$(find . -name '*.csproj' -not -path './node_modules/*' -print -quit)" ]; then
            add csharp autobuild
          fi
          if [ -f go.mod ]; then
            add go autobuild
          fi

          echo "Detected matrix: $langs"
          echo "matrix=$langs" >> "$GITHUB_OUTPUT"
          echo "any=$(echo "$langs" | jq 'length > 0')" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------- analyze --
  analyze:
    name: Analyze (${{ matrix.language }})
    needs: detect-languages
    if: needs.detect-languages.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45 # compiled-language autobuilds can be slow

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-languages.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3 # pinact: pin to release SHA
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds 60+ additional security queries;
          # security-and-quality adds maintainability/reliability checks.
          queries: security-extended,security-and-quality
          # CUSTOMIZE: adjust ignore paths for the project layout
          config: |
            paths-ignore:
              - node_modules
              - dist
              - build
              - vendor
              - '**/*.test.ts'
              - '**/*.spec.ts'
              - tests
              - __tests__

      # If autobuild fails for a compiled language, replace build-mode above
      # with "manual" and add explicit build steps here, e.g.:
      #   - name: Manual build
      #     if: matrix.build-mode == 'manual'
      #     run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3 # pinact: pin to release SHA
        with:
          category: /language:${{ matrix.language }}
          # Results land in GitHub Security → Code scanning.
          # Branch protection on "Code scanning results / CodeQL" makes
          # critical findings block PRs.
